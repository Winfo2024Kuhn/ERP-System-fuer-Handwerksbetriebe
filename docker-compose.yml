version: "3.8"

services:

  # ========== MariaDB Datenbank ==========
  mariadb:
    image: mariadb:11.4
    container_name: kalkulationsprogramm-mariadb
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-erp_root_2024}
      MARIADB_DATABASE: kalkulationsprogramm_db
      MARIADB_USER: ${MARIADB_USER:-erp_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-erp_secret_2024}
    volumes:
      - mariadb_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_german2_ci
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD:-erp_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ========== Spring Boot Anwendung ==========
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kalkulationsprogramm-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APP_DB_URL: ${APP_DB_URL:-jdbc:mariadb://mariadb:3306/kalkulationsprogramm_db?useUnicode=true&characterEncoding=UTF-8}
      APP_DB_USER: ${APP_DB_USER:-erp_user}
      APP_DB_PASS: ${APP_DB_PASS:-erp_secret_2024}
      MARIADB_USER: ${MARIADB_USER:-erp_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-erp_secret_2024}
      APP_ADMIN_USER: ${APP_ADMIN_USER:-Marvin}
      APP_ADMIN_PASS: ${APP_ADMIN_PASS:-123456}
    volumes:
      - app_uploads:/app/uploads
      - app_logs:/app/logs
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  # ========== Qdrant (Vektordatenbank für KI/RAG) ==========
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: kalkulationsprogramm-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

volumes:
  mariadb_data:
  app_uploads:
  app_logs:
  qdrant_data:
