name: Traffic Stats sammeln

on:
  schedule:
    - cron: '0 2 * * *'   # täglich um 02:00 UTC
  workflow_dispatch:        # auch manuell auslösbar

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: traffic-stats
  cancel-in-progress: true

jobs:
  collect-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: main Branch auschecken
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.TRAFFIC_TOKEN }}

      - name: Traffic-Daten abrufen und Snapshot schreiben
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          DATA_FILE=".github/traffic/data.json"
          mkdir -p .github/traffic

          VIEWS_JSON=$(curl --fail-with-body -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/views?per=day")
          echo "Views API: $VIEWS_JSON"

          CLONES_JSON=$(curl --fail-with-body -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/clones?per=day")
          echo "Clones API: $CLONES_JSON"

          REFERRERS_JSON=$(curl --fail-with-body -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/popular/referrers")
          echo "Referrers API: $REFERRERS_JSON"

          PATHS_JSON=$(curl --fail-with-body -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/popular/paths")
          echo "Popular Content API: $PATHS_JSON"

          REPO_JSON=$(curl --fail-with-body -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO")

          echo "$VIEWS_JSON" | jq -e '.count | numbers' > /dev/null
          echo "$VIEWS_JSON" | jq -e '.uniques | numbers' > /dev/null
          echo "$CLONES_JSON" | jq -e '.count | numbers' > /dev/null
          echo "$CLONES_JSON" | jq -e '.uniques | numbers' > /dev/null
          echo "$REFERRERS_JSON" | jq -e 'if type == "array" then . else empty end' > /dev/null
          echo "$PATHS_JSON" | jq -e 'if type == "array" then . else empty end' > /dev/null
          echo "$REPO_JSON" | jq -e '.stargazers_count | numbers' > /dev/null

          jq -n \
            --argjson views "$(echo "$VIEWS_JSON" | jq '.count // 0')" \
            --argjson unique_views "$(echo "$VIEWS_JSON" | jq '.uniques // 0')" \
            --argjson clones "$(echo "$CLONES_JSON" | jq '.count // 0')" \
            --argjson unique_clones "$(echo "$CLONES_JSON" | jq '.uniques // 0')" \
            --argjson daily_views "$(echo "$VIEWS_JSON" | jq '.views // []')" \
            --argjson daily_clones "$(echo "$CLONES_JSON" | jq '.clones // []')" \
            --argjson referring_sites "$(echo "$REFERRERS_JSON" | jq '.')" \
            --argjson popular_content "$(echo "$PATHS_JSON" | jq '.')" \
            --argjson stars "$(echo "$REPO_JSON" | jq '.stargazers_count // 0')" \
            --argjson forks "$(echo "$REPO_JSON" | jq '.forks_count // 0')" \
            --argjson watchers "$(echo "$REPO_JSON" | jq '.subscribers_count // 0')" \
            --argjson open_issues "$(echo "$REPO_JSON" | jq '.open_issues_count // 0')" \
            --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              views_last_14_days: $views,
              unique_visitors_last_14_days: $unique_views,
              clones_last_14_days: $clones,
              unique_cloners_last_14_days: $unique_clones,
              daily_views: $daily_views,
              daily_clones: $daily_clones,
              referring_sites: $referring_sites,
              popular_content: $popular_content,
              stars: $stars,
              forks: $forks,
              watchers: $watchers,
              open_issues: $open_issues,
              updated_at: $updated_at
            }' > "$DATA_FILE"

          echo "Views (14 Tage): $(echo "$VIEWS_JSON" | jq '.count // 0') (unique: $(echo "$VIEWS_JSON" | jq '.uniques // 0'))"
          echo "Clones (14 Tage): $(echo "$CLONES_JSON" | jq '.count // 0') (unique: $(echo "$CLONES_JSON" | jq '.uniques // 0'))"

      - name: Traffic-Update-Branch committen und pushen
        id: commit_changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --quiet -- .github/traffic/data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH_NAME="bot/traffic-stats"
          git switch -C "$BRANCH_NAME"
          git add .github/traffic/data.json
          git commit -m "chore(traffic): aktualisiere GitHub-Traffic-Daten [skip ci]"
          git push --force-with-lease --set-upstream origin "$BRANCH_NAME"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Pull Request für main erstellen oder aktualisieren
        if: steps.commit_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: |
          BRANCH_NAME="bot/traffic-stats"
          PR_TITLE="chore(traffic): aktualisiere GitHub-Traffic-Daten"
          PR_BODY=$(cat <<'EOF'
          Automatisches Update der GitHub-Traffic-Daten.

          - aktualisiert `.github/traffic/data.json`
          - spiegelt die echten GitHub-Werte der letzten 14 Tage
          - läuft regelkonform über einen Pull Request in `main`
          EOF
          )

          PR_NUMBER=$(gh pr list --base main --head "$BRANCH_NAME" --state open --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body "$PR_BODY"
          else
            gh pr create --base main --head "$BRANCH_NAME" --title "$PR_TITLE" --body "$PR_BODY"
          fi
