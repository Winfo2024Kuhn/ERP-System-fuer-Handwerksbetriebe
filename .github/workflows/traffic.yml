name: Traffic Stats sammeln

on:
  schedule:
    - cron: '0 2 * * *'   # täglich um 02:00 UTC
  workflow_dispatch:        # auch manuell auslösbar

permissions:
  contents: write

jobs:
  collect-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Traffic-Daten abrufen und akkumulieren
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          DATA_FILE=".github/traffic/data.json"
          mkdir -p .github/traffic

          # Vorhandene akkumulierte Daten laden (oder Startwerte setzen)
          if [ -f "$DATA_FILE" ]; then
            ACC_VIEWS=$(jq '.total_views // 0' "$DATA_FILE")
            ACC_UNIQ_VIEWS=$(jq '.total_unique_views // 0' "$DATA_FILE")
            ACC_CLONES=$(jq '.total_clones // 0' "$DATA_FILE")
            ACC_UNIQ_CLONES=$(jq '.total_unique_clones // 0' "$DATA_FILE")
            LAST_VIEW_TS=$(jq -r '.last_view_timestamp // "1970-01-01T00:00:00Z"' "$DATA_FILE")
            LAST_CLONE_TS=$(jq -r '.last_clone_timestamp // "1970-01-01T00:00:00Z"' "$DATA_FILE")
          else
            ACC_VIEWS=0; ACC_UNIQ_VIEWS=0; ACC_CLONES=0; ACC_UNIQ_CLONES=0
            LAST_VIEW_TS="1970-01-01T00:00:00Z"
            LAST_CLONE_TS="1970-01-01T00:00:00Z"
          fi

          # Views-Daten der letzten 14 Tage abrufen
          VIEWS_JSON=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/views?per=day")
          echo "Views API Antwort: $VIEWS_JSON"

          # Nur neue Einträge addieren (.views? // [] verhindert Fehler bei API-Fehlern)
          NEW_VIEWS=$(echo "$VIEWS_JSON" | jq --arg last "$LAST_VIEW_TS" '
            [ (.views? // [])[] | select(.timestamp > $last) ] |
            { count: (map(.count) | add // 0), uniques: (map(.uniques) | add // 0) }
          ')
          ADD_VIEWS=$(echo "$NEW_VIEWS" | jq '.count // 0')
          ADD_UNIQ_VIEWS=$(echo "$NEW_VIEWS" | jq '.uniques // 0')
          LATEST_VIEW_TS=$(echo "$VIEWS_JSON" | jq -r '[ (.views? // [])[] | .timestamp ] | sort | last // "1970-01-01T00:00:00Z"')

          # Clones-Daten der letzten 14 Tage abrufen
          CLONES_JSON=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/traffic/clones?per=day")
          echo "Clones API Antwort: $CLONES_JSON"

          NEW_CLONES=$(echo "$CLONES_JSON" | jq --arg last "$LAST_CLONE_TS" '
            [ (.clones? // [])[] | select(.timestamp > $last) ] |
            { count: (map(.count) | add // 0), uniques: (map(.uniques) | add // 0) }
          ')
          ADD_CLONES=$(echo "$NEW_CLONES" | jq '.count // 0')
          ADD_UNIQ_CLONES=$(echo "$NEW_CLONES" | jq '.uniques // 0')
          LATEST_CLONE_TS=$(echo "$CLONES_JSON" | jq -r '[ (.clones? // [])[] | .timestamp ] | sort | last // "1970-01-01T00:00:00Z"')

          # Repo-Metadaten (Stars, Forks) abrufen
          REPO_JSON=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO")
          STARS=$(echo "$REPO_JSON" | jq '.stargazers_count // 0')
          FORKS=$(echo "$REPO_JSON" | jq '.forks_count // 0')
          WATCHERS=$(echo "$REPO_JSON" | jq '.subscribers_count // 0')
          OPEN_ISSUES=$(echo "$REPO_JSON" | jq '.open_issues_count // 0')

          # Neue Gesamtwerte berechnen
          TOTAL_VIEWS=$((ACC_VIEWS + ADD_VIEWS))
          TOTAL_UNIQ_VIEWS=$((ACC_UNIQ_VIEWS + ADD_UNIQ_VIEWS))
          TOTAL_CLONES=$((ACC_CLONES + ADD_CLONES))
          TOTAL_UNIQ_CLONES=$((ACC_UNIQ_CLONES + ADD_UNIQ_CLONES))

          # Neuestes Timestamp übernehmen (nie rückwärts gehen)
          if [[ "$LATEST_VIEW_TS" > "$LAST_VIEW_TS" ]]; then
            LAST_VIEW_TS="$LATEST_VIEW_TS"
          fi
          if [[ "$LATEST_CLONE_TS" > "$LAST_CLONE_TS" ]]; then
            LAST_CLONE_TS="$LATEST_CLONE_TS"
          fi

          # JSON schreiben
          jq -n \
            --argjson total_views "$TOTAL_VIEWS" \
            --argjson total_unique_views "$TOTAL_UNIQ_VIEWS" \
            --argjson total_clones "$TOTAL_CLONES" \
            --argjson total_unique_clones "$TOTAL_UNIQ_CLONES" \
            --arg last_view_timestamp "$LAST_VIEW_TS" \
            --arg last_clone_timestamp "$LAST_CLONE_TS" \
            --argjson stars "$STARS" \
            --argjson forks "$FORKS" \
            --argjson watchers "$WATCHERS" \
            --argjson open_issues "$OPEN_ISSUES" \
            --arg updated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              total_views: $total_views,
              total_unique_views: $total_unique_views,
              total_clones: $total_clones,
              total_unique_clones: $total_unique_clones,
              last_view_timestamp: $last_view_timestamp,
              last_clone_timestamp: $last_clone_timestamp,
              stars: $stars,
              forks: $forks,
              watchers: $watchers,
              open_issues: $open_issues,
              updated_at: $updated_at
            }' > "$DATA_FILE"

          echo "Gesamt-Views: $TOTAL_VIEWS (unique: $TOTAL_UNIQ_VIEWS)"
          echo "Gesamt-Clones: $TOTAL_CLONES (unique: $TOTAL_UNIQ_CLONES)"
          echo "Stars: $STARS | Forks: $FORKS | Watchers: $WATCHERS"

      - name: Daten committen
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/traffic/data.json
          git diff --staged --quiet || git commit -m "chore(traffic): täglich aktualisierte Besuchsstatistiken [skip ci]"
          git push
