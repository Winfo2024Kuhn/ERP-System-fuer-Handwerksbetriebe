# ========== Docker Profile ==========
# Diese Datei wird automatisch geladen wenn spring.profiles.active=docker

# Datenbank-Verbindung (Standard: MariaDB-Container, optional: MySQL per APP_DB_URL)
spring.datasource.url=${APP_DB_URL:jdbc:mariadb://mariadb:3306/kalkulationsprogramm_db?useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${APP_DB_USER:${MARIADB_USER:erp_user}}
spring.datasource.password=${APP_DB_PASS:${MARIADB_PASSWORD:CHANGE_ME_DB_PW}}

# Warte auf Datenbankverbindung (Container-Startup kann dauern)
spring.datasource.hikari.initialization-fail-timeout=120000
spring.datasource.hikari.connection-timeout=30000

# Upload-Pfade (Docker Volume)
file.upload-dir=/app/uploads
file.mail-attachment-dir=/app/uploads/attachments
file.supplier-mail-attachment-dir=/app/uploads/attachments/lieferanten
file.image-upload-dir=/app/uploads/images
file.offer-upload-dir=/app/uploads/offers
file.cutaway_images-dir=/app/uploads/cutaway_images
hicad.local-path=/app/uploads/CADdrawings
hicad.network-url=
hicad.network-drive-letter=

# DevTools im Docker-Container deaktivieren
spring.devtools.restart.enabled=false

# AI/RAG deaktivieren (kann über Umgebungsvariablen aktiviert werden)
ai.rag.enabled=false
ai.email.enabled=false
email.features.enabled=false

# SMTP, IMAP und Gemini API Key werden zur Laufzeit über die UI
# (System-Einstellungen) gepflegt und in der Datenbank (system_setting) gespeichert.
# Hier KEINE Defaults oder Umgebungsvariablen-Mappings mehr setzen.

# Zeiterfassung Base-URL
zeiterfassung.base-url=${ZEITERFASSUNG_URL:http://localhost:8080}
