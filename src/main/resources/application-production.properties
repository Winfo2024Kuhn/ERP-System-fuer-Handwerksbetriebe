# Resource-conscious production defaults for shared hosting.
spring.devtools.restart.enabled=false
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.flyway.validate-on-migrate=true

spring.datasource.hikari.maximum-pool-size=${APP_DB_POOL_MAX:5}
spring.datasource.hikari.minimum-idle=${APP_DB_POOL_MIN:1}
spring.datasource.hikari.connection-timeout=${APP_DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${APP_DB_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${APP_DB_MAX_LIFETIME_MS:1200000}

server.tomcat.threads.max=${APP_HTTP_THREADS_MAX:40}
server.tomcat.threads.min-spare=${APP_HTTP_THREADS_MIN:2}
server.tomcat.max-connections=${APP_HTTP_MAX_CONNECTIONS:200}
server.tomcat.accept-count=${APP_HTTP_ACCEPT_COUNT:50}

spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_REQUEST_SIZE:110MB}

ai.rag.enabled=${AI_RAG_ENABLED:false}
ai.ollama.enabled=${AI_OLLAMA_ENABLED:false}
ai.email.enabled=${AI_EMAIL_ENABLED:false}
email.features.enabled=${EMAIL_FEATURES_ENABLED:false}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=false

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
