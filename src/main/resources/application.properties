# DevTools: Restart deaktivieren während E-Mail-Import läuft (lange IMAP-Operationen)
spring.devtools.restart.enabled=false

spring.application.name=Kalkulationsprogramm

# ========== Authentifizierung ==========
# Admin-Zugangsdaten über Umgebungsvariablen setzen:
#   Windows (PowerShell):  $env:APP_ADMIN_USER="meinUser"; $env:APP_ADMIN_PASS="meinPasswort"
#   Linux/macOS:           export APP_ADMIN_USER=meinUser APP_ADMIN_PASS=meinPasswort
app.admin.username=${APP_ADMIN_USER:admin}
app.admin.password=${APP_ADMIN_PASS:changeme}

# MySQL Database
#Laptop
#spring.datasource.url=jdbc:mysql://192.168.x.x:3307/kalkulationsprogramm_db?useUnicode=true&characterEncoding=UTF-8#Laptop
#Zweiter Rechner
#spring.datasource.url=jdbc:mysql://192.168.x.x:3307/kalkulationsprogramm_db?useUnicode=true&characterEncoding=UTF-8
# PC Firma
spring.datasource.url=jdbc:mysql://localhost:3307/kalkulationsprogramm_db?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_german2_ci
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
server.port=8080
#Backups
# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=OFF
# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=true
# TEMPORÄR: Checksum-Validierung deaktivieren wegen V102-Mismatch (nach erfolgreicher Migration entfernen!)
spring.flyway.validate-on-migrate=false
# Upload-Konfiguration
hicad.local-path=${user.dir}/uploads/CADdrawings
hicad.network-url=\\\\SERVER_PC\\\\CADdrawings
# Optional: Windows Netzlaufwerk-Buchstabe, falls Freigabe als Laufwerk gemappt ist (z. B. Z:)
hicad.network-drive-letter=Z:

file.upload-dir=${user.dir}/uploads
file.mail-attachment-dir=${user.dir}/uploads/attachments
file.supplier-mail-attachment-dir=${user.dir}/uploads/attachments/lieferanten
file.image-upload-dir=${user.dir}/uploads/images
file.offer-upload-dir=${user.dir}/uploads/offers
file.cutaway_images-dir=${user.dir}/uploads/cutaway_images

spring.servlet.multipart.max-file-size=15GB
spring.servlet.multipart.max-request-size=15GB
# Info: Die Anwendung ist unter http://localhost:8082 erreichbar

# Zeiterfassung PWA Base-URL (für QR-Code Generierung)
# Für Cloudflare Tunnel: https://deine-subdomain.trycloudflare.com
zeiterfassung.base-url=https://your-subdomain.trycloudflare.com
# SMTP configuration placeholders
smtp.host=smtp.example.com
#ausgehende Mails Port
smtp.port=465
smtp.username=info-info@example-company.de
smtp.password=YOUR_SMTP_PASSWORD
# Spring Mail properties (used by UnifiedEmailController)
spring.mail.host=smtp.example.com
spring.mail.port=465
spring.mail.username=info-info@example-company.de
spring.mail.password=YOUR_SMTP_PASSWORD
# Encoding configuration
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.datasource.hikari.connectionInitSql=SET NAMES utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
# Use a lighter isolation level to reduce gap locks
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.jpa.properties.hibernate.connection.isolation=2
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
# Standard E-Mail-Signatur (HTML, %s wird durch den Benutzernamen ersetzt)


ai.email.enabled=true

# Setze auf false, um KI zu deaktivieren
# ai.email.enabled=false

# Email-Features (Import, Cleanup, Vendor-Abruf) komplett deaktivieren
# Auf true setzen, um Email-Scheduled-Tasks wieder zu aktivieren
email.features.enabled=false

##
## Ollama Cloud (OpenAI-kompatibel)
##
# ai.email.provider=ollama-cloud
# ai.email.url=https://api.ollama.com/v1/chat/completions   # optional, Standard
# ai.email.model=gpt-oss:120b                              # Beispielmodell
#
# API-SchlÃ¼ssel NICHT hier eintragen. Stattdessen als Umgebungsvariable setzen:
#   Windows (PowerShell):   $env:OLLAMA_API_KEY="<dein key>"
#   Linux/macOS (bash):     export OLLAMA_API_KEY="<dein key>"
#

# ========== GEMINI Scanner & PDF ==========
ai.gemini.api-key=YOUR_GEMINI_API_KEY

# Separate Modelle pro Service (latest = immer das neueste Modell)
ai.gemini.model.dokument-analyse=gemini-flash-latest
ai.gemini.model.scanner=gemini-flash-latest
ai.gemini.model.pdf-extractor=gemini-flash-latest
ai.gemini.model.pro=gemini-pro-latest
# E-Mail KI (Beautify/Korrektur)
ai.email.model=gemini-flash-latest

# KI-Hilfe Chat Modell (gemini-flash-latest unterstuetzt Google Search Grounding)
ai.ki-hilfe.model=gemini-flash-latest
ai.ki-hilfe.web-search-enabled=true

# ========== RAG / Lokale Vektor-Suche ==========
# Beim Start wird der Quellcode gechunkt und per Gemini embedded (kein Docker noetig)
ai.rag.enabled=true
ai.rag.top-k=10
ai.rag.score-threshold=0.3

# HikariCP Timeouts für lange KI-Anfragen
spring.datasource.hikari.connection-timeout=120000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ========== VENDOR INVOICE INTEGRATION ==========
# Microsoft Azure Billing API (für Azure/M365 Rechnungen)
vendor.microsoft.enabled=false
vendor.microsoft.tenant-id=
vendor.microsoft.client-id=
vendor.microsoft.client-secret=
vendor.microsoft.billing-account-id=

# Amazon Business Reconciliation API (für Amazon Rechnungen)
vendor.amazon.enabled=false
vendor.amazon.client-id=
vendor.amazon.client-secret=
vendor.amazon.refresh-token=
vendor.amazon.region=EU

# Apple: Keine API verfügbar - Rechnungen via E-Mail (GlobalEmailWatcher)

# Jackson: LocalDate als ISO-String statt Array serialisieren
spring.jackson.serialization.write-dates-as-timestamps=false

# Enable Legacy Ant Path Matcher for Regex support in URLs (e.g. /zeiterfassung/**/{path:[^\.]*})
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
