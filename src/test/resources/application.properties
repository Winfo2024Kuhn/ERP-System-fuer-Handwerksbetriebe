spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false
spring.jpa.show-sql=false

# Ensure file storage paths point inside workspace during tests
file.upload-dir=uploads
file.image-upload-dir=uploads/images
# Flat structure for email attachments (matching production default)
file.mail-attachment-dir=uploads/email
file.supplier-mail-attachment-dir=uploads/attachments/lieferanten
hicad.local-path=uploads/CADdrawings
# UNC not used in unit tests, keep a harmless placeholder
hicad.network-url=\\\\localhost\\dummy

# Dummy SMTP settings to satisfy @Value injections during tests
smtp.host=localhost
smtp.port=2525
smtp.username=test
smtp.password=test

# Dummy AI Gemini settings for tests
ai.gemini.api-key=test-api-key
ai.gemini.model-name=gemini-test

# Ollama deaktiviert in Tests (braucht laufenden Server)
ai.ollama.enabled=false
ai.ollama.url=http://localhost:11434
ai.ollama.model=qwen3:8b
ai.ollama.timeout=10

# Dummy IMAP settings for email tests
imap.host=localhost
imap.port=993
imap.username=test
imap.password=test
imap.folder=INBOX
